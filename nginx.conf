server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # Backend API — proxied to the Express container (localhost:3001 in same ECS task)
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Teams bot webhook — Azure Bot Service posts here, proxied to bot container (localhost:3978)
    # Register https://<your-domain>/bot/api/messages as the Azure Bot Service messaging endpoint
    location /bot/ {
        rewrite            ^/bot/(.*)$ /$1 break;
        proxy_pass         http://localhost:3978;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Confluence live-sync proxy (path strip: /confluence-api → /wiki/rest/api)
    location /confluence-api/ {
        proxy_pass           https://aheadcloudservices.atlassian.net/wiki/rest/api/;
        proxy_set_header     Host              aheadcloudservices.atlassian.net;
        proxy_ssl_server_name on;
        proxy_pass_header    Authorization;
        proxy_set_header     X-Real-IP         $remote_addr;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
