# Deploy AHEAD Onboarding to AWS (ECS Fargate + ECR).
# Uses the same GitHub Actions secrets pattern as policy-agent-ref:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
name: Deploy onboarding to AWS

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "bot/**"
      - "src/**"
      - "Dockerfile.frontend"
      - "aws/**"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  CI: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Secrets must be defined on THIS repo (or org secrets with access to this repo).
      # Repo: Settings → Secrets and variables → Actions → New repository secret
      - name: Check AWS secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "::error::Missing AWS credentials for this repository."
            echo "Add these Action secrets (same names as policy-agent-ref):"
            echo "  AWS_ACCESS_KEY_ID"
            echo "  AWS_SECRET_ACCESS_KEY"
            echo "https://github.com/elnamir-ahead/onboarding/settings/secrets/actions"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Optional: auto-create ECS service on first deploy (comma-separated subnet IDs, no spaces).
      - name: Deploy (build, push ECR, register task, update ECS)
        env:
          ECS_SUBNET_IDS: ${{ secrets.ECS_SUBNET_IDS }}
          ECS_SECURITY_GROUP_ID: ${{ secrets.ECS_SECURITY_GROUP_ID }}
          ECS_TARGET_GROUP_ARN: ${{ secrets.ECS_TARGET_GROUP_ARN }}
        run: |
          chmod +x aws/deploy.sh aws/create-service.sh aws/ensure-ecs-execution-role.sh
          bash aws/deploy.sh
